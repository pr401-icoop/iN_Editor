<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iN Editor</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Malgun Gothic','맑은 고딕',sans-serif; background:#f2f2f2; color:#222; font-size:15px; }
body.props-open { padding-bottom:62px; }

/* ── 시작 모달 ── */
#start-modal { display:flex; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:2000; align-items:center; justify-content:center; }
.start-box { background:#fff; border-radius:16px; box-shadow:0 16px 60px rgba(0,0,0,0.22); width:540px; max-width:96vw; padding:40px 36px 32px; }
.start-logo { font-size:22px; font-weight:900; color:#C8174F; letter-spacing:-0.5px; margin-bottom:6px; }
.start-sub { font-size:13px; color:#aaa; margin-bottom:30px; }
.start-options { display:flex; gap:16px; }
.start-opt { flex:1; border:2px solid #e8e8e8; border-radius:10px; padding:22px 16px 20px; text-align:center; cursor:pointer; transition:all 0.15s; user-select:none; }
.start-opt:hover { border-color:#C8174F; background:#fff5f7; }
.start-opt-icon { font-size:30px; margin-bottom:10px; }
.start-opt-title { font-size:16px; font-weight:800; color:#222; margin-bottom:6px; }
.start-opt-desc { font-size:12px; color:#999; line-height:1.5; }

/* ── 헤더 ── */
#header { background:#fff; border-bottom:1px solid #e0e0e0; padding:0 16px; height:54px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:200; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
.logo-wrap { display:flex; align-items:center; height:42px; flex-shrink:0; cursor:pointer; }
.logo-wrap img { height:30px; width:auto; }
.header-divider { width:1px; height:24px; background:#e0e0e0; flex-shrink:0; }
.title-area { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
#doc-title { border:none; outline:none; font-size:16px; font-family:inherit; color:#222; background:transparent; flex:1; min-width:0; font-weight:500; }
#doc-title::placeholder { color:#bbb; font-weight:400; }
#autosave-indicator { font-size:12px; color:#bbb; white-space:nowrap; flex-shrink:0; }
#autosave-indicator.saved { color:#27ae60; }
#autosave-indicator.editing { color:#e67e22; }
.header-right { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.hdr-btn { background:#fff; border:1px solid #ddd; border-radius:4px; padding:6px 12px; font-size:13px; font-family:inherit; color:#444; cursor:pointer; white-space:nowrap; transition:all 0.1s; }
.hdr-btn:hover { background:#f5f5f5; border-color:#bbb; }
.hdr-btn-save { background:#fff; border:1px solid #C8174F; color:#C8174F; border-radius:4px; padding:6px 12px; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; white-space:nowrap; }
.hdr-btn-save:hover { background:#fff0f4; }
.hdr-sep { width:1px; height:20px; background:#e0e0e0; margin:0 2px; }

/* 드롭다운 */
.dropdown-wrap { position:relative; }
.dropdown-menu { display:none; position:absolute; top:calc(100%+8px); right:0; background:#fff; border:1px solid #ddd; border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,0.12); width:290px; z-index:500; overflow:hidden; }
.dropdown-menu.open { display:block; }
.dropdown-header { padding:10px 14px; font-size:12px; font-weight:700; color:#333; background:#fafafa; border-bottom:1px solid #eee; display:flex; align-items:center; justify-content:space-between; }
.doc-list { max-height:280px; overflow-y:auto; }
.doc-item { padding:10px 14px; border-bottom:1px solid #f2f2f2; cursor:pointer; display:flex; align-items:center; gap:8px; transition:background 0.1s; }
.doc-item:hover { background:#fafafa; }
.doc-item.current { background:#fff5f7; }
.doc-item-info { flex:1; min-width:0; }
.doc-item-title { font-size:13px; font-weight:600; color:#222; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.doc-item-date { font-size:11px; color:#bbb; margin-top:2px; }
.doc-item-del { background:none; border:none; color:#ccc; cursor:pointer; font-size:15px; padding:2px 6px; border-radius:3px; }
.doc-item-del:hover { color:#C8174F; background:#fff0f3; }
.doc-list-empty { padding:20px; text-align:center; color:#ccc; font-size:13px; }
.dropdown-footer { padding:8px 10px; border-top:1px solid #eee; display:flex; gap:6px; flex-wrap:wrap; }
.dropdown-footer button { flex:1; background:#f5f5f5; border:1px solid #e5e5e5; border-radius:4px; padding:7px 4px; font-size:12px; font-weight:600; color:#555; cursor:pointer; font-family:inherit; white-space:nowrap; }
.dropdown-footer button:hover { background:#eaeaea; }

/* ── 삽입 툴바 ── */
#insert-bar { background:#fff; border-bottom:1px solid #e8e8e8; padding:0 12px; height:50px; display:flex; align-items:center; gap:2px; position:sticky; top:54px; z-index:199; }
.ins-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:5px 9px; border:none; background:none; border-radius:4px; cursor:pointer; font-family:inherit; color:#333; min-width:46px; transition:background 0.1s; }
.ins-btn:hover { background:#f5f5f5; }
.ins-icon { font-size:17px; line-height:1; }
.ins-label { font-size:11px; color:#888; white-space:nowrap; }
.ins-divider { width:1px; height:26px; background:#e8e8e8; margin:0 2px; flex-shrink:0; }
.ins-right { margin-left:auto; display:flex; align-items:center; gap:6px; flex-shrink:0; }
.ins-right-btn { background:#fff; border:1px solid #ddd; border-radius:4px; padding:5px 11px; font-size:13px; font-family:inherit; color:#444; cursor:pointer; white-space:nowrap; height:34px; transition:all 0.1s; }
.ins-right-btn:hover { background:#f5f5f5; border-color:#bbb; }
.ins-right-btn.primary { background:#C8174F; border-color:#C8174F; color:#fff; font-weight:700; }
.ins-right-btn.primary:hover { background:#a8103e; }
.theme-dots { display:flex; align-items:center; gap:5px; }
.theme-dot { width:18px; height:18px; border-radius:50%; border:2px solid rgba(0,0,0,0.12); cursor:pointer; transition:transform 0.12s, box-shadow 0.12s; flex-shrink:0; }
.theme-dot:hover { transform:scale(1.2); box-shadow:0 2px 8px rgba(0,0,0,0.2); }
.theme-dot.active { box-shadow:0 0 0 3px rgba(0,0,0,0.15); transform:scale(1.15); }

/* ── 서식 툴바 ── */
#format-bar { background:#fafafa; border-bottom:2px solid #e0e0e0; padding:0 12px; height:42px; display:flex; align-items:center; gap:1px; position:sticky; top:104px; z-index:198; }
.fmt-select { border:none; border-right:1px solid #e0e0e0; background:none; padding:4px 6px; font-size:13px; font-family:inherit; color:#333; cursor:pointer; outline:none; height:100%; }
.fmt-sep { width:1px; height:20px; background:#e0e0e0; margin:0 2px; flex-shrink:0; }
.fmt-btn { border:none; background:none; border-radius:3px; padding:4px 7px; cursor:pointer; font-size:13px; font-family:inherit; color:#333; white-space:nowrap; transition:background 0.1s; }
.fmt-btn:hover { background:#ebebeb; }
.color-btn { width:24px; height:24px; border-radius:3px; border:1px solid #ddd; cursor:pointer; flex-shrink:0; }
.fmt-label { font-size:11px; color:#aaa; padding:0 2px; white-space:nowrap; }
.color-palette { display:none; position:absolute; background:#fff; border:1px solid #ddd; border-radius:6px; padding:8px; box-shadow:0 4px 16px rgba(0,0,0,0.12); z-index:600; flex-wrap:wrap; width:192px; gap:3px; }
.color-palette.open { display:flex; }
.color-swatch { width:24px; height:24px; border-radius:3px; border:1px solid rgba(0,0,0,0.08); cursor:pointer; transition:transform 0.1s; }
.color-swatch:hover { transform:scale(1.15); }
.fs-wrap { display:flex; align-items:center; gap:1px; height:100%; border-right:1px solid #e0e0e0; padding-right:6px; margin-right:2px; }
#fs-select { border:none; background:none; padding:3px 2px; font-size:13px; font-family:inherit; color:#333; cursor:pointer; outline:none; width:54px; }
#fs-input { border:1px solid #ddd; border-radius:3px; background:#fff; padding:3px 4px; font-size:13px; font-family:inherit; color:#333; outline:none; width:44px; text-align:center; }
#fs-input:focus { border-color:#C8174F; }
.fs-btn { border:none; background:none; border-radius:3px; padding:2px 5px; cursor:pointer; font-size:14px; line-height:1; color:#555; font-weight:700; transition:background 0.1s; }
.fs-btn:hover { background:#ebebeb; }

/* ── 에디터 ── */
#main { display:flex; min-height:calc(100vh - 146px); }
#editor-panel { flex:1; padding:24px 16px; display:flex; flex-direction:column; align-items:center; }
#editor-wrap { background:#fff; width:100%; max-width:1100px; min-height:860px; border:1px solid #e4e4e4; border-radius:2px; box-shadow:0 1px 6px rgba(0,0,0,0.06); position:relative; }
#editor { min-height:860px; padding:44px 30px; outline:none; font-size:16px; line-height:1.9; color:#222; word-break:break-word; overflow-wrap:break-word; }
#editor:empty:before { content:'본문 내용을 입력하세요.'; color:#ccc; pointer-events:none; }
#editor img { max-width:100%; height:auto; display:inline-block; margin:4px 0; }
#editor hr { cursor:pointer; margin:16px 0; padding:6px 0; box-sizing:content-box; }
#editor table { border-collapse:collapse; width:100%; margin:14px 0; table-layout:fixed; }
#editor table td, #editor table th { border:1px solid #ccc; padding:10px 14px; min-width:60px; font-size:15px; vertical-align:top; cursor:text; word-break:break-word; }
#editor table th { background:#f5f5f5; font-weight:700; }
#editor hr { border:none; border-top:1px solid #e0e0e0; margin:22px 0; }
#editor blockquote { border-left:3px solid #C8174F; margin:14px 0; padding:10px 18px; background:#fff8f9; color:#555; cursor:pointer; }
#editor sup { font-size:0.75em; vertical-align:super; }
#editor sub { font-size:0.75em; vertical-align:sub; }
#editor a { color:#C8174F; }

/* ── 도형 (div 기반 텍스트박스) ── */
.in-shape {
  display: inline-block;
  min-height: 40px;
  padding: 12px 16px;
  cursor: text;
  vertical-align: middle;
  word-break: break-word;
  overflow: hidden;
  position: relative;
  line-height: 1.5;
  transition: none;
}
.in-shape.in-line {
  display: block;
  min-height: 4px;
  padding: 0;
  cursor: default;
  overflow: visible;
}
.in-shape:focus { outline: none; }

/* ── 리사이즈 오버레이 ── */
#resize-overlay { display:none; position:fixed; z-index:750; pointer-events:none; box-shadow:0 0 0 2px #C8174F; }
#resize-overlay.visible { display:block; }
#ro-move { position:absolute; inset:0; cursor:move; pointer-events:all; background:transparent; }
.rh { position:absolute; width:9px; height:9px; background:#fff; border:2px solid #C8174F; border-radius:2px; pointer-events:all; z-index:2; }
.rh.nw { top:-5px; left:-5px; cursor:nwse-resize; }
.rh.n  { top:-5px; left:calc(50% - 4px); cursor:ns-resize; }
.rh.ne { top:-5px; right:-5px; cursor:nesw-resize; }
.rh.e  { top:calc(50% - 4px); right:-5px; cursor:ew-resize; }
.rh.se { bottom:-5px; right:-5px; cursor:nwse-resize; }
.rh.s  { bottom:-5px; left:calc(50% - 4px); cursor:ns-resize; }
.rh.sw { bottom:-5px; left:-5px; cursor:nesw-resize; }
.rh.w  { top:calc(50% - 4px); left:-5px; cursor:ew-resize; }

/* ── 속성 패널 (하단 고정) ── */
#props-panel {
  position:fixed; bottom:-70px; left:0; right:0; height:60px;
  background:#fff; border-top:2px solid #C8174F; z-index:900;
  transition:bottom 0.2s ease;
  display:flex; align-items:center; gap:6px; padding:0 16px;
  box-shadow:0 -3px 16px rgba(0,0,0,0.1); overflow-x:auto; overflow-y:hidden;
  white-space:nowrap;
}
#props-panel.visible { bottom:0; }
.pp-group { display:none; align-items:center; gap:6px; }
.pp-group.active { display:flex; }
.pp-label { font-size:11px; color:#888; white-space:nowrap; flex-shrink:0; }
.pp-sep { width:1px; height:28px; background:#e8e8e8; flex-shrink:0; margin:0 2px; }
.pp-color { width:26px; height:26px; border-radius:4px; border:1px solid #ddd; cursor:pointer; padding:0; flex-shrink:0; }
.pp-num { border:1px solid #ddd; border-radius:3px; padding:3px 5px; font-size:12px; font-family:inherit; width:52px; outline:none; }
.pp-num:focus { border-color:#C8174F; }
.pp-num-sm { border:1px solid #ddd; border-radius:3px; padding:3px 4px; font-size:12px; font-family:inherit; width:40px; outline:none; }
.pp-range { width:70px; }
.pp-small { font-size:11px; color:#666; min-width:28px; }
.pp-btn { background:#f0f0f0; border:1px solid #ddd; border-radius:4px; padding:4px 8px; font-size:12px; font-family:inherit; color:#333; cursor:pointer; white-space:nowrap; }
.pp-btn:hover { background:#e4e4e4; }
.pp-btn.danger { background:#fff0f0; color:#C8174F; border-color:#f5b8c5; }
.pp-btn.danger:hover { background:#ffe0e6; }
.pp-del-btn { background:#C8174F; border:none; border-radius:4px; padding:4px 10px; font-size:12px; font-family:inherit; color:#fff; cursor:pointer; }
.pp-del-btn:hover { background:#a8103e; }
.pp-btn.active { background:#4a90d9; color:#fff; border-color:#3a7bc8; }
.pp-side-btn { min-width:30px; padding:4px 4px; text-align:center; }
.rc-swatch { width:18px; height:18px; border-radius:3px; border:1px solid rgba(0,0,0,0.15); cursor:pointer; display:inline-block; flex-shrink:0; transition:transform 0.1s; }
.rc-swatch:hover { transform:scale(1.25); outline:2px solid #4a90d9; }
.pp-color-btn { width:26px;height:26px;border-radius:4px;border:1px solid #ccc;cursor:pointer;flex-shrink:0;display:inline-block;vertical-align:middle; }
.pp-color-btn:hover { border-color:#999; }
.cp-swatch { width:18px;height:18px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);cursor:pointer;display:inline-block;flex-shrink:0;transition:transform .1s; }
.cp-swatch:hover { transform:scale(1.25);outline:2px solid #4a90d9; }
#cp-overlay * { box-sizing:border-box; }
.pp-section-title { font-size:11px; font-weight:700; color:#C8174F; padding-right:4px; flex-shrink:0; }
select.pp-select { border:1px solid #ddd; border-radius:3px; padding:3px 4px; font-size:12px; font-family:inherit; outline:none; }
input[type=checkbox].pp-check { width:14px; height:14px; cursor:pointer; flex-shrink:0; }
.cell-selected { outline:2px solid #4a90d9 !important; outline-offset:-2px; background-color:rgba(74,144,217,0.06) !important; }
.cell-selected-multi { outline:2px solid #4a90d9 !important; outline-offset:-2px; background-color:rgba(74,144,217,0.12) !important; }
.elem-multi-selected { outline:2px dashed #4a90d9 !important; outline-offset:3px; }
.pp-none-lbl { font-size:11px; color:#888; cursor:pointer; display:flex; align-items:center; gap:2px; white-space:nowrap; flex-shrink:0; margin-left:-2px; }

/* ── HTML 패널 ── */
#html-panel { width:380px; background:#1e1e1e; display:flex; flex-direction:column; transition:width 0.2s; }
#html-panel.collapsed { width:0; overflow:hidden; }
#html-panel-header { background:#2d2d2d; padding:10px 14px; display:flex; align-items:center; gap:8px; border-bottom:1px solid #444; }
#html-panel-header span { flex:1; color:#ccc; font-weight:600; font-size:14px; }
#html-panel-header button { background:none; border:none; color:#888; cursor:pointer; font-size:12px; padding:3px 8px; border-radius:3px; font-family:inherit; }
#html-editor { flex:1; padding:14px; font-family:'Consolas','D2Coding',monospace; font-size:12px; line-height:1.7; white-space:pre-wrap; word-break:break-all; overflow-y:auto; color:#9cdcfe; background:#1e1e1e; border:none; outline:none; resize:none; width:100%; }
#html-panel-footer { background:#2d2d2d; padding:8px 10px; display:flex; gap:6px; border-top:1px solid #444; }
#html-panel-footer button { flex:1; padding:8px; border-radius:4px; border:none; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }

/* ── 도형 패널 ── */
#shape-panel { display:none; position:fixed; top:150px; right:20px; background:#fff; border:1px solid #ddd; border-radius:10px; padding:16px; box-shadow:0 4px 20px rgba(0,0,0,0.13); z-index:400; width:230px; }
#shape-panel.open { display:block; }
#shape-panel h4 { font-size:13px; font-weight:700; color:#333; margin-bottom:12px; }
.sh-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; font-size:13px; }
.sh-row label { width:60px; color:#666; flex-shrink:0; font-size:12px; }
.sh-row input[type=color] { width:36px; height:24px; border:1px solid #ddd; border-radius:3px; cursor:pointer; padding:0; }
.sh-row input[type=range] { flex:1; }
.sh-row input[type=number] { flex:1; border:1px solid #ddd; border-radius:4px; padding:4px 6px; font-size:13px; font-family:inherit; outline:none; }
.sh-row select { flex:1; border:1px solid #ddd; border-radius:4px; padding:4px; font-size:13px; font-family:inherit; outline:none; }
.sh-row span.sh-val { font-size:11px; color:#888; min-width:28px; }
.sh-btns { display:flex; gap:8px; margin-top:4px; }
.sh-btns button { flex:1; background:#f5f5f5; border:1px solid #ddd; border-radius:4px; padding:7px 4px; font-size:12px; font-weight:600; color:#444; cursor:pointer; font-family:inherit; }
.sh-btns button.primary { background:#C8174F; color:#fff; border-color:#C8174F; }

/* ── 모달 ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:#fff; border-radius:10px; padding:24px; width:420px; box-shadow:0 8px 32px rgba(0,0,0,0.18); max-height:90vh; overflow-y:auto; }
.modal h3 { font-size:15px; margin-bottom:14px; color:#222; font-weight:700; }
.modal input[type=text],.modal input[type=url],.modal input[type=number] { width:100%; border:1px solid #ddd; border-radius:5px; padding:9px 11px; font-size:14px; font-family:inherit; margin-bottom:10px; outline:none; }
.modal input:focus { border-color:#C8174F; }
.modal .modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }
.modal .modal-btns button { padding:8px 18px; border-radius:5px; border:none; cursor:pointer; font-size:14px; font-family:inherit; font-weight:700; }
.modal .btn-ok { background:#C8174F; color:#fff; }
.modal .btn-ok:hover { background:#a8103e; }
.modal .btn-cancel { background:#f0f0f0; color:#555; }
.modal .row { display:flex; align-items:center; gap:8px; margin-bottom:10px; font-size:14px; }
.modal .row input[type=number] { width:76px; margin-bottom:0; display:inline-block; }
#img-drop-zone { border:2px dashed #ddd; border-radius:7px; padding:28px; text-align:center; color:#aaa; font-size:14px; cursor:pointer; margin-bottom:12px; transition:border-color 0.15s; }
#img-drop-zone:hover { border-color:#C8174F; color:#C8174F; }

/* ── 토스트 ── */
#toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:#222; color:#fff; padding:10px 22px; border-radius:20px; font-size:14px; opacity:0; transition:all 0.22s; pointer-events:none; z-index:9999; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media(max-width:1100px) { #html-panel { display:none; } #editor { padding:22px 16px; } }
.sm-back { background:none; border:none; color:#aaa; cursor:pointer; font-size:13px; padding:0 0 14px; display:block; font-family:inherit; }
.sm-back:hover { color:#C8174F; }
.sm-ai-notice { background:#e8f5e9; color:#2e7d32; border-radius:8px; padding:12px 16px; margin:12px 0 8px; font-size:14px; font-weight:700; }
.sm-ai-guide { font-size:13px; color:#666; margin-bottom:12px; line-height:1.6; }
#sm-paste-area { width:100%; height:150px; border:2px dashed #ddd; border-radius:8px; padding:12px; font-size:12px; font-family:'Consolas',monospace; resize:vertical; outline:none; box-sizing:border-box; }
#sm-paste-area:focus { border-color:#C8174F; }
.sm-ai-apply { background:#C8174F; color:#fff; border:none; border-radius:6px; padding:10px 22px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
.sm-ai-apply:hover { background:#a8103e; }
</style>
</head>
<body>

<div id="start-modal">
  <div class="start-box">
    <div id="sm-main">
      <div class="start-logo">iN Editor</div>
      <div class="start-sub">시작할 방식을 선택하세요</div>
      <div class="start-options">
        <div class="start-opt" onclick="goSub('sogsik')">
          <div class="start-opt-icon">📰</div>
          <div class="start-opt-title">소식</div>
          <div class="start-opt-desc">소식 템플릿으로 시작합니다</div>
        </div>
        <div class="start-opt" onclick="goSub('gian')">
